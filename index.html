    <title>Wordle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <h1>Wordle Game</h1>
      <div class="game-grid">
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
      </div>
      <p id="message"></p>
      <div class="inputs">
        <input type="text" name="word-input" id="word-input" autocomplete="off" maxlength="5"/>
        <button>Submit Guess</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
